[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mingap"
version = "0.1.0"
description = "MinGap column-permutation optimisation (block cost on ternary matrices)."
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Emeric" }]
dependencies = ["nb1p"]

[project.optional-dependencies]
sat = ["python-sat>=1.8"]
ilp = ["highspy>=1.5"]
sa = ["numpy>=1.24", "numba>=0.58"]
data = ["duckdb>=1.0"]
tsp = ["networkx>=3.0"]
all = ["mingap[sat,ilp,sa,data,tsp]"]

[project.scripts]
mingap-cli = "mingap.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/mingap"]
