[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "syntesim_bridge"
version = "0.1.0"
description = "Loader that feeds syntesim simulation logs into MinGap's matrix solvers."
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Emeric" }]
dependencies = ["syntesim", "nb1p", "mingap"]

[project.optional-dependencies]
viz = ["matplotlib>=3.7", "sglpp"]

[tool.hatch.build.targets.wheel]
packages = ["src/syntesim_bridge"]
